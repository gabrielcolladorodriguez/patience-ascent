name: Patience Ascent iOS

# GitHub Actions CI is optional sanity check only.
# App Store / TestFlight builds use Codemagic with Xcode 26.6+ (iOS 26 SDK required since 2026-04-28).

on:
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements-asc.txt
      - run: python scripts/verify_apple_setup.py
        continue-on-error: true
      - run: echo "For TestFlight use Codemagic workflow patience-ascent-ios (Xcode 26.6)"
