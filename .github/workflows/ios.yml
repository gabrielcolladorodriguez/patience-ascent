name: Patience Ascent iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Patience Ascent
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Build for Simulator (sin firma)
        run: |
          xcodebuild \
            -project SolitaireRoyale.xcodeproj \
            -scheme SolitaireRoyale \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build summary
        run: echo "✅ Patience Ascent (com.patienceascent.app) compila correctamente"

