workflows:
  patience-ascent-ios:
    name: Patience Ascent iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect

    environment:
      vars:
        BUNDLE_ID: com.patienceascent.app
        APPLE_TEAM_ID: T8GC6LS6RS
        XCODE_PROJECT: SolitaireRoyale.xcodeproj
        XCODE_SCHEME: SolitaireRoyale
      xcode: latest

    scripts:
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize

          CERT_KEY_PATH="$CM_BUILD_DIR/cert_key.pem"
          if [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$CERT_KEY_PATH"
          else
            openssl genrsa -out "$CERT_KEY_PATH" 2048
            echo ""
            echo "=========================================="
            echo "IMPORTANT: Save this as CERTIFICATE_PRIVATE_KEY"
            echo "Codemagic → App → Environment variables → Secret"
            echo "Group name: code-signing"
            echo "=========================================="
            cat "$CERT_KEY_PATH"
            echo "=========================================="
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create \
            --certificate-key=@file:"$CERT_KEY_PATH"

          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Build IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
