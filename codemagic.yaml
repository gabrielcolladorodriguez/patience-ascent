workflows:
  patience-ascent-ios:
    name: Patience Ascent iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect

    environment:
      vars:
        BUNDLE_ID: com.patienceascent.app
        APPLE_TEAM_ID: T8GC6LS6RS
        XCODE_PROJECT: SolitaireRoyale.xcodeproj
        XCODE_SCHEME: SolitaireRoyale
      xcode: latest

    scripts:
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create
          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Build IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
