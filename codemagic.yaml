workflows:
  patience-ascent-ios:
    name: Patience Ascent iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect

    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.patienceascent.app
        APPLE_TEAM_ID: T8GC6LS6RS
        XCODE_PROJECT: SolitaireRoyale.xcodeproj
        XCODE_SCHEME: SolitaireRoyale
      xcode: latest

    scripts:
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize

          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: Falta CERTIFICATE_PRIVATE_KEY (grupo: code-signing)"
            exit 1
          fi

          CERT_KEY_PATH="$CM_BUILD_DIR/cert_key.pem"
          printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$CERT_KEY_PATH"
          openssl rsa -in "$CERT_KEY_PATH" -check -noout

          if ! app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:"$CERT_KEY_PATH"; then
            echo ""
            echo "=========================================="
            echo "ACCIÓN REQUERIDA EN APPLE DEVELOPER:"
            echo "1. developer.apple.com → Certificates"
            echo "2. Revoca TODOS los Apple Distribution viejos"
            echo "3. Vuelve a lanzar la build"
            echo "=========================================="
            echo ""
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --platform IOS \
              --create \
              --certificate-key=@file:"$CERT_KEY_PATH"
          fi

          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
          security find-identity -v -p codesigning

      - name: Prepare resources for code signing
        script: |
          set -ex
          find "$CM_BUILD_DIR/SolitaireRoyale/GameAssets" -type f -exec chmod 644 {} \;

      - name: Build IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
