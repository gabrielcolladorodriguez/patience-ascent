workflows:
  patience-ascent-ios:
    name: Patience Ascent iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect

    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.patienceascent.app
        APPLE_TEAM_ID: T8GC6LS6RS
        XCODE_PROJECT: SolitaireRoyale.xcodeproj
        XCODE_SCHEME: SolitaireRoyale
      xcode: 16.4

    scripts:
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize

          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: Falta CERTIFICATE_PRIVATE_KEY (grupo: code-signing)"
            exit 1
          fi

          CERT_KEY_PATH="$CM_BUILD_DIR/cert_key.pem"
          printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$CERT_KEY_PATH"
          openssl rsa -in "$CERT_KEY_PATH" -check -noout

          # App ID must include Game Center or archive fails on entitlements.
          BUNDLE_RESOURCE_ID="$(app-store-connect bundle-ids list --json --filter "identifier=$BUNDLE_ID" | python3 -c 'import sys,json; d=json.load(sys.stdin); print((d.get("data") or [{}])[0].get("id",""))')"
          if [ -n "$BUNDLE_RESOURCE_ID" ]; then
            app-store-connect bundle-ids enable-capabilities "$BUNDLE_RESOURCE_ID" --capability "Game Center" || true
          else
            echo "WARNING: Could not resolve bundle ID resource for $BUNDLE_ID"
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create \
            --certificate-key=@file:"$CERT_KEY_PATH"

          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
          security find-identity -v -p codesigning

      - name: Prepare resources for code signing
        script: |
          set -ex
          find "$CM_BUILD_DIR/SolitaireRoyale/GameAssets" -type f -exec chmod 644 {} \;

      - name: Build IPA
        script: |
          set -ex
          if ! xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release; then
            echo "========== xcodebuild errors (last 120 lines) =========="
            for log in /tmp/xcodebuild_logs/*.log; do
              [ -f "$log" ] && tail -120 "$log"
            done
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
