workflows:
  patience-ascent-ios:
    name: Patience Ascent iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect

    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.patienceascent.app
        BUNDLE_RESOURCE_ID: DVG85PSU28
        APPLE_TEAM_ID: T8GC6LS6RS
        XCODE_PROJECT: SolitaireRoyale.xcodeproj
        XCODE_SCHEME: SolitaireRoyale
      xcode: 16.4

    scripts:
      - name: Set up code signing
        script: |
          set -ex
          chmod +x "$CM_BUILD_DIR/scripts/codemagic_signing.sh"
          "$CM_BUILD_DIR/scripts/codemagic_signing.sh"

      - name: Prepare resources for code signing
        script: |
          set -ex
          find "$CM_BUILD_DIR/SolitaireRoyale/GameAssets" -type f -exec chmod 644 {} \;

      - name: Build IPA
        script: |
          set -ex
          if ! xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release; then
            echo "========== xcodebuild errors (last 200 lines) =========="
            for log in /tmp/xcodebuild_logs/*.log; do
              [ -f "$log" ] && tail -200 "$log"
            done
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
